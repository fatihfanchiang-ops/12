<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的线上商店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #e74c3c;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .products {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
        }

        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            background-color: #f0f0f0;
        }

        /* Shown when no image URL is provided */
        .product-img-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.9rem;
            gap: 0.5rem;
        }

        .product-img-placeholder span {
            font-size: 2rem;
        }

        .product-info {
            padding: 1rem;
        }

        .product-name {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .add-to-cart:hover {
            background-color: #2980b9;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 350px;
            height: 100vh;
            background-color: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; }
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .cart-header {
            padding: 1rem;
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 1rem;
            background-color: #ecf0f1;
        }

        .cart-item-info { flex: 1; }

        .cart-item-name {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-btn {
            width: 25px;
            height: 25px;
            border: 1px solid #ddd;
            background: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .remove-item {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }

        .cart-footer {
            padding: 1rem;
            border-top: 1px solid #eee;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            z-index: 99;
        }

        .overlay.active { display: block; }

        .empty-cart {
            text-align: center;
            padding: 2rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">我的线上商店</div>
        <div class="cart-icon" id="cartIcon">
            購物車
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>

    <div class="container">
        <h1>精選商品</h1>
        <div class="products" id="productsContainer"></div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>我的購物車</h2>
            <button class="close-cart" id="closeCart">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">購物車為空</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>總計：</span>
                <span id="cartTotal">¥0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">結算</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script>
        // ============================================================
        //  PRODUCT DATA — edit this section to customise your store
        //  For each product:
        //    name  : display name shown on the card
        //    price : price in ¥
        //    image : paste your image URL here (or leave "" for a placeholder)
        // ============================================================
        const products = [
            {
                id: 1,
                name: "商品一",
                price: 99.99,
                image: ""   // <-- paste your image URL here
            },
            {
                id: 2,
                name: "商品二",
                price: 199.99,
                image: ""   // <-- paste your image URL here
            },
            {
                id: 3,
                name: "商品三",
                price: 299.99,
                image: ""   // <-- paste your image URL here
            },
            {
                id: 4,
                name: "商品四",
                price: 89.99,
                image: ""   // <-- paste your image URL here
            },
            {
                id: 5,
                name: "商品五",
                price: 59.99,
                image: ""   // <-- paste your image URL here
            },
            {
                id: 6,
                name: "商品六",
                price: 159.99,
                image: "https://www.google.com/url?sa=i&url=https%3A%2F%2Fwww.instagram.com%2Fp%2FDUVlBtZkYxr%2F&psig=AOvVaw1TZWt4I2lT8Hwlh3qczpsQ&ust=1771904255284000&source=images&cd=vfe&opi=89978449&ved=0CBUQjRxqFwoTCNivle_X7pIDFQAAAAAdAAAAABAE"   // <-- paste your image URL here
            }
        ];
        // ============================================================
        //  END OF PRODUCT DATA
        // ============================================================

        let cart = [];

        const productsContainer = document.getElementById('productsContainer');
        const cartIcon           = document.getElementById('cartIcon');
        const cartSidebar        = document.getElementById('cartSidebar');
        const closeCart          = document.getElementById('closeCart');
        const overlay            = document.getElementById('overlay');
        const cartCount          = document.getElementById('cartCount');
        const cartItems          = document.getElementById('cartItems');
        const cartTotal          = document.getElementById('cartTotal');
        const checkoutBtn        = document.getElementById('checkoutBtn');

        // Build the image element — shows a placeholder if no URL is given
        function buildImageHTML(product, cssClass) {
            if (product.image && product.image.trim() !== "") {
                return `<img src="${product.image}" alt="${product.name}" class="${cssClass}">`;
            }
            return `
                <div class="product-img-placeholder">
                    <span>🖼️</span>
                    <p>No image yet</p>
                </div>`;
        }

        function initProducts() {
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${buildImageHTML(product, 'product-img')}
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-price">¥${product.price.toFixed(2)}</p>
                        <button class="add-to-cart" data-id="${product.id}">加入購物車</button>
                    </div>
                `;
                productsContainer.appendChild(card);
            });

            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', addToCart);
            });
        }

        function addToCart(e) {
            const productId = parseInt(e.target.dataset.id);
            const product   = products.find(p => p.id === productId);
            if (!product) return;

            const existing = cart.find(i => i.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartUI();
            showToast(`${product.name} 已加入購物車！`);
        }

        function updateCartUI() {
            const totalItems = cart.reduce((t, i) => t + i.quantity, 0);
            cartCount.textContent = totalItems;

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">購物車為空</div>';
                cartTotal.textContent = '¥0.00';
                return;
            }

            cartItems.innerHTML = '';
            let totalPrice = 0;

            cart.forEach(item => {
                totalPrice += item.price * item.quantity;

                const imgTag = item.image && item.image.trim() !== ""
                    ? `<img src="${item.image}" alt="${item.name}" class="cart-item-img">`
                    : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🖼️</div>`;

                const el = document.createElement('div');
                el.className = 'cart-item';
                el.innerHTML = `
                    ${imgTag}
                    <div class="cart-item-info">
                        <h4 class="cart-item-name">${item.name}</h4>
                        <p class="cart-item-price">¥${item.price.toFixed(2)}</p>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn decrease" data-id="${item.id}">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn increase" data-id="${item.id}">+</button>
                        </div>
                        <button class="remove-item" data-id="${item.id}">移除</button>
                    </div>
                `;
                cartItems.appendChild(el);
            });

            cartTotal.textContent = `¥${totalPrice.toFixed(2)}`;
            bindCartItemEvents();
        }

        function bindCartItemEvents() {
            document.querySelectorAll('.increase').forEach(btn => {
                btn.addEventListener('click', e => {
                    const id   = parseInt(e.target.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) { item.quantity += 1; updateCartUI(); }
                });
            });

            document.querySelectorAll('.decrease').forEach(btn => {
                btn.addEventListener('click', e => {
                    const id   = parseInt(e.target.dataset.id);
                    const item = cart.find(i => i.id === id);
                    if (item) {
                        item.quantity -= 1;
                        if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                        updateCartUI();
                    }
                });
            });

            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', e => {
                    const id = parseInt(e.target.dataset.id);
                    cart = cart.filter(i => i.id !== id);
                    updateCartUI();
                });
            });
        }

        function checkout() {
            if (cart.length === 0) { alert('購物車為空，無法結算！'); return; }
            const total = cart.reduce((t, i) => t + i.price * i.quantity, 0);
            if (confirm(`確認結算？總計：¥${total.toFixed(2)}`)) {
                alert('結算成功！感謝您的購買！');
                cart = [];
                updateCartUI();
                cartSidebar.classList.remove('active');
                overlay.classList.remove('active');
            }
        }

        // Simple toast notification (replaces alert on add-to-cart)
        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
                    background:#2c3e50; color:white; padding:0.7rem 1.5rem;
                    border-radius:20px; font-size:0.95rem; z-index:200;
                    opacity:0; transition:opacity 0.3s ease;
                `;
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function initEvents() {
            cartIcon.addEventListener('click', () => {
                cartSidebar.classList.add('active');
                overlay.classList.add('active');
            });
            closeCart.addEventListener('click', () => {
                cartSidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
            overlay.addEventListener('click', () => {
                cartSidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
            checkoutBtn.addEventListener('click', checkout);
        }

        initProducts();
        initEvents();
        updateCartUI();
    </script>
</body>
</html>
